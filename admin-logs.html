<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scan Surveillance — NQR Admin</title>
<script src="config.js"></script>
<script src="backend.js"></script>
<link rel="stylesheet" href="styles.css?v=3"/>
<link rel="stylesheet" href="admin.css?v=4"/>
<style>
  .print-only { display: none; }
  .scan-table-wrap {
    overflow-x: auto;
    border-radius: var(--r-md);
  }
</style>
</head>
<body class="dash-body">

<script>
  let currentQrFilter = null;

  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    currentQrFilter = params.get('qr');
    
    if (currentQrFilter) {
      const headerTitle = document.querySelector('.dash-header h1');
      const headerSub   = document.querySelector('.dash-header p');
      
      if (headerTitle) headerTitle.textContent = `Audit Log: ${currentQrFilter}`;
      if (headerSub) headerSub.textContent = `Showing all scan events specifically for QR ID: ${currentQrFilter}`;
      
      // If we had data, we would filter here. 
      // Since it's currently empty, we'll just ensure the empty state is clear.
      const emptyMsg = document.querySelector('.scan-table-wrap .t-small');
      if (emptyMsg) emptyMsg.textContent = `No scan events recorded for ${currentQrFilter} yet.`;
    }
  });

  function handlePrint() {
    const rows = document.querySelectorAll('.dash-table tbody tr');
    // If the only row is the "No events" row, don't try to print an empty table
    if (rows.length === 1 && rows[0].innerText.includes('No scan events')) {
      alert('Nothing to print. No scan events recorded.');
      return;
    }

    let tableRows = '';
    rows.forEach(row => {
      // Skip the empty message row if it somehow got in here
      if (row.innerText.includes('No scan events')) return;

      const cells = row.querySelectorAll('td');
      const timestamp = cells[0] ? cells[0].innerText.trim() : '';
      const qrName = cells[1] ? cells[1].querySelector('.t-small') ? cells[1].querySelector('.t-small').innerText.trim() : '' : '';
      const qrId   = cells[1] ? cells[1].querySelector('.t-label') ? cells[1].querySelector('.t-label').innerText.trim() : '' : '';
      const ip     = cells[2] ? cells[2].querySelector('.t-small') ? cells[2].querySelector('.t-small').innerText.trim() : '' : '';
      const loc    = cells[2] ? cells[2].querySelector('.t-label') ? cells[2].querySelector('.t-label').innerText.trim() : '' : '';
      const device = cells[3] ? cells[3].innerText.trim() : '';
      const status = cells[4] ? cells[4].innerText.trim() : '';
      const isBad  = status.toLowerCase().includes('reject') || status.toLowerCase().includes('fail');
      tableRows += `<tr>
        <td>${timestamp}</td>
        <td><strong>${qrName}</strong><br><span style="font-size:0.7rem;color:#666">${qrId}</span></td>
        <td>${ip}<br><span style="font-size:0.7rem;color:#666">${loc}</span></td>
        <td>${device}</td>
        <td><span style="display:inline-block;padding:2px 6px;border:1px solid ${isBad?'#c00':'#333'};font-weight:600;font-size:8px;text-transform:uppercase;letter-spacing:0.06em;color:${isBad?'#c00':'#333'}">${status}</span></td>
      </tr>`;
    });

    const reportTitle = currentQrFilter ? `QR Scan Audit: ${currentQrFilter}` : 'Global QR Scan Audit Report';

    const html = `<!DOCTYPE html><html><head>
      <meta charset="UTF-8"/>
      <title>${reportTitle} — NQR</title>
      <style>
        @page { margin: 0.8cm; size: landscape; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #000; background: #fff; margin: 0; padding: 16px; }
        .report-header { text-align: center; border-bottom: 2px solid #222; padding-bottom: 14px; margin-bottom: 20px; }
        .report-header h1 { font-size: 22px; margin: 0 0 4px; font-weight: 800; }
        .report-header p { margin: 2px 0; font-size: 12px; color: #555; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { border: 1px solid #aaa; border-radius: 6px; padding: 12px 16px; }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #666; margin-bottom: 4px; }
        .stat-value { font-size: 22px; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        thead th { background: #f0f0f0; border: 1px solid #999; padding: 9px 12px; font-weight: 700; text-align: center; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
        tbody td { border: 1px solid #ccc; padding: 9px 12px; vertical-align: middle; text-align: center; }
        tbody tr:nth-child(even) td { background: #fafafa; }
        .footer { text-align: right; font-size: 10px; color: #999; margin-top: 16px; border-top: 1px solid #ddd; padding-top: 8px; }
      </style>
    </head><body>
      <div class="report-header">
        <h1>${reportTitle}</h1>
        <p>NQR Enterprise Platform — Confidential Analytics</p>
        <p>Generated: ${new Date().toLocaleString()}</p>
      </div>
      <div class="stats">
        <div class="stat-card"><div class="stat-label">Uptime</div><div class="stat-value" style="color:#16a34a">99.998%</div></div>
        <div class="stat-card"><div class="stat-label">Total Scans (24h)</div><div class="stat-value" style="color:#2563eb">1,284</div></div>
        <div class="stat-card"><div class="stat-label">Unique IPs</div><div class="stat-value" style="color:#d97706">412</div></div>
      </div>
      <table>
        <thead><tr><th>Timestamp</th><th>QR Name / ID</th><th>Location (IP)</th><th>Device Type</th><th>Status</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
      <div class="footer">NQR — Confidential. Not for external distribution.</div>
    </body></html>`;

    const win = window.open('', '_blank', 'width=1100,height=700');
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(() => { win.print(); }, 400);
  }
</script>

<script>
  const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
  if (isLoggedIn !== 'true') { window.location.href = 'admin-portal.html'; }
</script>

<div class="dash-layout">
  <header class="dash-top-nav">
    <div class="dash-nav-container">
      <div class="dash-brand">
        <div class="nav__logo-mark">N</div>
        <div class="nav__logo-text">NQR</div>
      </div>
      
      <nav class="dash-nav">
        <div class="dash-nav-group">
          <a href="admin.html" class="dash-nav-item">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Overview
          </a>
          <a href="admin-users.html" class="dash-nav-item">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87m-4-12a4 4 0 010 7.75"/></svg>
            Users
          </a>
          <a href="admin-logs.html" class="dash-nav-item active">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Logs
          </a>
        </div>

        <div class="dash-nav-group">
          <a href="admin-qrs.html" class="dash-nav-item">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h7v7h-7z"/></svg>
            Settings
          </a>
        </div>
      </nav>
      
      <div class="dash-user">
        <div class="dash-avatar" style="background:var(--c-red); width:28px; height:28px; font-size:0.65rem">AD</div>
        <div class="flex-1 hide-mobile" style="margin-left: 8px">
          <div class="t-small" style="font-weight:600; font-size:0.75rem">Admin</div>
        </div>
        <a href="#" onclick="handleLogout()" class="btn btn--ghost btn--icon" style="padding:4px; margin-left: 8px" title="Logout">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </a>
      </div>
    </div>
  </header>

  <script>
    function handleLogout() {
      sessionStorage.removeItem('adminLoggedIn');
      window.location.href = 'index.html';
    }
  </script>

  <main class="dash-main anim-fade-up">
    <header class="dash-header">
      <div>
        <h1 class="t-h3">Scan Surveillance</h1>
        <p class="t-small text-muted mt-xs">Real-time audit of QR code scans, IP locations, and acquisition metrics.</p>
      </div>
      <div class="flex gap-sm">
        <button class="btn btn--primary btn--sm" onclick="handlePrint()">Print Audit Report</button>
      </div>
    </header>

    <div class="dash-content">
      <div class="flex gap-md mb-lg anim-stagger">
        <div class="card card--static card-glass" style="flex:1">
          <div class="card-inner p-md">
            <div class="t-label text-muted" style="font-size:0.65rem">Uptime</div>
            <div class="t-h4" style="color:#4ade80; margin-top:4px">—</div>
          </div>
        </div>
        <div class="card card--static card-glass" style="flex:1">
          <div class="card-inner p-md">
            <div class="t-label text-muted" style="font-size:0.65rem">Total Scans (24h)</div>
            <div class="t-h4" style="color:var(--c-blue-light); margin-top:4px">—</div>
          </div>
        </div>
        <div class="card card--static card-glass" style="flex:1">
          <div class="card-inner p-md">
            <div class="t-label text-muted" style="font-size:0.65rem">Unique IPs</div>
            <div class="t-h4" style="color:#facc15; margin-top:4px">—</div>
          </div>
        </div>
      </div>

      <div class="card card-glass">
        <div class="scan-table-wrap">
          <table class="dash-table w-full text-left">
            <thead>
              <tr>
                <th class="t-label text-muted text-center" style="padding: 16px">Timestamp</th>
                <th class="t-label text-muted text-center">QR Name / ID</th>
                <th class="t-label text-muted text-center">Location (IP)</th>
                <th class="t-label text-muted text-center">Device Type</th>
                <th class="t-label text-muted text-center" style="padding: 16px">Status</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="5" style="text-align:center; padding: 48px 16px; opacity: 0.4;">
                  <div class="t-small">No scan events recorded yet.</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

</body>
</html>
