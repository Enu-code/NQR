<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Portal — Secure Entry | Platform Control</title>
<meta name="description" content="Secure administrative gateway for NQR Platform Management. Restricted access for authorized personnel only.">
<script src="config.js"></script>
<script src="backend.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..1000;1,9..40,300..1000&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<style>
:root {
  --c-red: #D90429;
  --c-red-glow: rgba(217, 4, 41, 0.35);
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}

body {
  background-color: #060810 !important;
  color: #F0F2FA !important;
  font-family: var(--font-body);
  overflow-x: hidden;
}

/* ── Ambient Glows ── */
.glow-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
.glow-orb--1 {
  width: 60vw; height: 60vh;
  background: radial-gradient(circle, rgba(217,4,41,0.08) 0%, transparent 70%);
  top: -10%; left: -10%;
}
.glow-orb--2 {
  width: 40vw; height: 40vh;
  background: radial-gradient(circle, rgba(59,91,219,0.06) 0%, transparent 70%);
  bottom: 0; right: 0;
}

/* ── UI Components ── */
.premium-glass {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 30px 60px rgba(0,0,0,0.5);
}

.auth-card {
  width: 100%;
  max-width: 440px;
  padding: 3rem;
  border-radius: 24px;
}

.form-input {
  background: rgba(255,255,255,0.04) !important;
  border: 1px solid rgba(255,255,255,0.08) !important;
  border-radius: 12px !important;
  color: #fff !important;
  transition: all 0.25s ease !important;
}
.form-input:focus {
  border-color: var(--c-red) !important;
  box-shadow: 0 0 0 4px rgba(217,4,41,0.1) !important;
  background: rgba(255,255,255,0.06) !important;
}

.cta-btn {
  background: linear-gradient(135deg, #D90429 0%, #a80320 100%);
  color: #fff;
  font-family: var(--font-display);
  font-weight: 700;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 0 20px rgba(217,4,41,0.3);
}
.cta-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 40px rgba(217,4,41,0.5);
  filter: brightness(1.1);
}
.cta-btn:active { transform: scale(0.98); }

.bg-grid {
  background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
}

.t-gradient {
  background: linear-gradient(135deg, #fff 0%, #D90429 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ── Animations ── */
.loading-spinner {
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255,255,255,0.1);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

.btn-loading .loading-spinner { display: block; }
.btn-loading .btn-text { display: none; }

</style>
</head>
<body class="bg-[#060810] min-h-screen flex items-center justify-center p-6 bg-grid">

<!-- Background Effects -->
<div class="glow-orb glow-orb--1"></div>
<div class="glow-orb glow-orb--2"></div>

<main class="relative z-10 w-full flex flex-col items-center">
    
    <!-- Header Logo -->
    <div class="mb-12 flex flex-col items-center gap-2 group cursor-pointer" onclick="window.location.href='index.html'">
        <div class="w-14 h-14 bg-gradient-to-br from-[#D90429] to-[#8a011a] rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(217,4,41,0.4)] transition-transform group-hover:scale-105">
            <img src="assets/logo.png" alt="NQR Logo" class="w-full h-full object-cover rounded-full border border-white/10"/>
        </div>
        <h1 class="font-display font-extrabold text-2xl tracking-tighter mt-2">NQR <span class="text-white/30 font-medium text-sm ml-1">ADMIN</span></h1>
    </div>

    <!-- Auth Card -->
    <div class="premium-glass auth-card space-y-8" id="loginCard">
        <div class="space-y-2">
            <div class="flex items-center gap-2 text-red-500 font-mono text-[10px] tracking-[0.3em] uppercase mb-1">
                <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span>
                Secure Entry Node
            </div>
            <h2 class="font-display text-4xl font-extrabold tracking-tight t-gradient">Vault Login</h2>
            <p class="text-white/40 text-sm font-medium">Platform control center. Authorized access only.</p>
        </div>

        <form class="space-y-6" onsubmit="handleAdminLogin(event, this)">
            <div class="space-y-4">
                <!-- Username Field -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-white/30 ml-1">Username</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/20 text-xl">account_circle</span>
                        <input class="form-input w-full pl-12 pr-4 py-4 outline-none placeholder:text-white/10" placeholder="admin" type="text" id="adminUsername" required autofocus/>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center ml-1">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-white/30">Password</label>
                        <a href="mailto:support@neverq.in" class="text-[9px] font-bold uppercase tracking-widest text-[#D90429]/60 hover:text-[#D90429] transition-colors">Emergency Access?</a>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/20 text-xl">lock</span>
                        <input class="form-input w-full pl-12 pr-12 py-4 outline-none placeholder:text-white/10" placeholder="••••••••" type="password" id="adminPassword" required/>
                        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/20 hover:text-white/60 transition-colors" onclick="togglePass()">
                            <span class="material-symbols-outlined text-xl" id="passIcon">visibility</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Error Box -->
            <div id="authError" class="hidden p-4 rounded-xl bg-red-500/10 border border-red-500/20 flex items-start gap-3 animate-[shake_0.4s_ease-in-out]">
                <span class="material-symbols-outlined text-red-500 text-lg">error</span>
                <p id="errorMsg" class="text-red-400 text-xs leading-relaxed font-medium"></p>
            </div>

            <button type="submit" id="submitBtn" class="cta-btn w-full py-4 rounded-xl flex items-center justify-center gap-3 group">
                <span class="btn-text">Establish Secure Link</span>
                <span class="material-symbols-outlined btn-text text-lg transition-transform group-hover:translate-x-1">terminal</span>
                <div class="loading-spinner"></div>
            </button>
        </form>

        <div class="pt-2 text-center">
            <a href="index.html" class="inline-flex items-center gap-2 text-[10px] font-bold uppercase tracking-[0.2em] text-white/20 hover:text-white/60 transition-all hover:-translate-x-1">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Back to Site
            </a>
        </div>
    </div>

    <!-- Footer Footprint -->
    <div class="mt-12 opacity-20 text-[9px] font-mono tracking-[0.4em] uppercase text-center select-none">
        System Protocol v4.0.2 // Neverno Cryptography Group
    </div>
</main>

<script>
function togglePass() {
    const p = document.getElementById('adminPassword');
    const i = document.getElementById('passIcon');
    if (p.type === 'password') {
        p.type = 'text';
        i.textContent = 'visibility_off';
    } else {
        p.type = 'password';
        i.textContent = 'visibility';
    }
}

async function handleAdminLogin(e, form) {
    e.preventDefault();
    const username = document.getElementById('adminUsername').value.trim();
    const password = document.getElementById('adminPassword').value;
    const errorBox = document.getElementById('authError');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    errorBox.classList.add('hidden');
    submitBtn.classList.add('btn-loading');
    submitBtn.disabled = true;

    try {
        const result = await window.API.adminLogin(username, password);
        
        // Success animation
        gsap.to('#loginCard', {
            opacity: 0,
            scale: 0.95,
            y: -20,
            duration: 0.5,
            ease: 'power3.inOut',
            onComplete: () => {
                window.location.href = 'admin.html';
            }
        });

    } catch (err) {
        errorMsg.textContent = err.message || 'Verification failed. Protocol rejected.';
        errorBox.classList.remove('hidden');
        gsap.fromTo(errorBox, { x: -10 }, { x: 0, duration: 0.4, ease: 'elastic.out(1, 0.3)' });
    } finally {
        submitBtn.classList.remove('btn-loading');
        submitBtn.disabled = false;
    }
}

// Stagger entrance
gsap.from('main > *', {
    opacity: 0,
    y: 30,
    duration: 0.8,
    stagger: 0.15,
    ease: 'power4.out',
    delay: 0.2
});
</script>

<style>
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
}
</style>

</body>
</html>
