<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>User Management — NQR Admin</title>
<script src="config.js"></script>
<script src="backend.js?v=7"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..1000;1,9..40,300..1000&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css?v=3"/>
<link rel="stylesheet" href="admin.css?v=8"/>
</head>
<body class="dash-body">
  <!-- Background Effects -->
  <div class="glow-orb glow-orb--1"></div>
  <div class="glow-orb glow-orb--2"></div>
  <div class="glow-orb glow-orb--3"></div>

<script>
  // ── INTERACTION FIX: Wake up page for dashboard entry ──
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.body.focus();
      window.dispatchEvent(new Event('resize'));
    }, 100);
  });
</script>

<script>
  const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
  if (isLoggedIn !== 'true') { window.location.href = 'admin-portal.html'; }
</script>

<div class="dash-layout">
  <header class="dash-top-nav">
    <div class="dash-nav-container">
      <div class="dash-brand" onclick="window.location.href='index.html'">
        <div class="vault-logo-mark">
          <img src="assets/logo.png" alt="NQR Logo" />
        </div>
        <div class="nav__logo-text">NQR</div>
      </div>
      
      <nav class="dash-nav">
        <div class="dash-nav-group">
          <a href="admin.html" class="dash-nav-item">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Overview
          </a>
          <a href="admin-users.html" class="dash-nav-item active">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87m-4-12a4 4 0 010 7.75"/></svg>
            Users
          </a>
          <a href="admin-logs.html" class="dash-nav-item">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Logs
          </a>
        </div>

        <div class="dash-nav-group">
          <a href="admin-qrs.html" class="dash-nav-item">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h7v7h-7z"/></svg>
            Settings
          </a>
        </div>
      </nav>
      
      <div class="dash-user">
        <div class="dash-avatar" style="background:var(--c-red); width:28px; height:28px; font-size:0.65rem">AD</div>
        <div class="flex-1 hide-mobile" style="margin-left: 8px">
          <div class="t-small" style="font-weight:600; font-size:0.75rem">Admin</div>
        </div>
        <a href="#" onclick="handleLogout()" class="btn btn--ghost btn--icon" style="padding:4px; margin-left: 8px" title="Logout">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </a>
      </div>
    </div>
  </header>

  <script>
    function handleLogout() {
      sessionStorage.removeItem('adminLoggedIn');
      window.location.href = 'index.html';
    }
  </script>

  <main class="dash-main anim-fade-up">
    <header class="dash-header">
      <div>
        <h1 class="t-h3">User Management</h1>
        <p class="t-small text-muted mt-xs">Detailed listing of users, their authentication methods, and platform activity.</p>
      </div>
      <div class="flex gap-md items-center">
        <div class="card card--static card-glass" style="min-width:160px">
          <div class="card-inner p-md">
            <div class="t-label text-muted" style="font-size:0.65rem">Total Users</div>
            <div class="t-h4" style="color:var(--c-blue-light); margin-top:4px" id="adminTotalUsers">0</div>
          </div>
        </div>
        <button class="btn btn--primary btn--sm" onclick="alert('Exporting user directory...')">Export Data</button>
      </div>
    </header>

    <div class="dash-content">
      <div class="card card--static mb-xl card-glass">
        <div class="card-inner">
          <div class="flex justify-between items-center mb-md">
            <div class="flex items-center gap-md" style="flex:1">
              <div style="position:relative; width:100%; max-width:400px">
                <input type="text" id="userDirectorySearch" class="form-input" placeholder="Search by username or email..." style="padding-left:40px"/>
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:0.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              </div>
            </div>
          </div>

          <div class="dash-table-wrap">
            <table class="dash-table w-full text-left" id="userDirectoryTable">
              <thead>
                <tr>
                  <th class="t-label text-muted" style="width:250px; text-align:left; padding-left:16px">User / Username</th>
                  <th class="t-label text-muted" style="text-align:center">Identity (Mail / Google)</th>
                  <th class="t-label text-muted" style="width:200px; text-align:center">Account Created</th>
                  <th class="t-label text-muted" style="width:120px; text-align:center">QRs Made</th>
                  <th class="t-label text-muted" style="width:140px; text-align:center">Status</th>
                </tr>
              </thead>
              <tbody>
                <tr id="emptyDirectoryRow">
                  <td colspan="5" class="py-xl text-center">
                    <p class="t-small text-muted">The system directory is currently empty. No users found.</p>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  // ── LIVE SEARCH & DATA POPULATION ──
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const stats = await window.API.getPlatformStats();
      const totalUsersEl = document.getElementById('adminTotalUsers');
      if (totalUsersEl) totalUsersEl.textContent = stats.totalUsers || 0;

      let usersResponse = await window.API.getAllUsers();
      let users = Array.isArray(usersResponse) ? usersResponse : (usersResponse.results || []);
      let allQrsResponse = await window.API.getAllQRs();
      let allQrs = Array.isArray(allQrsResponse) ? allQrsResponse : (allQrsResponse.results || []);
      const tbody = document.querySelector('#userDirectoryTable tbody');
      const emptyRow = document.getElementById('emptyDirectoryRow');

      if (users && users.length > 0) {
        if (emptyRow) emptyRow.style.display = 'none';
        tbody.innerHTML = ''; // Clear existing
        
        users.forEach(user => {
          // Count QRs for this specific user
          const qrCount = allQrs.filter(q => (q.ownerEmail || '').toLowerCase() === user.email.toLowerCase()).length;
          const isTester = user.email === 'tester@neverno.in';
          
          const tr = document.createElement('tr');
          tr.id = `user-${user.id}`;
          tr.innerHTML = `
            <td style="padding:16px">
              <div class="flex items-center gap-md">
                <div class="dash-avatar" style="background:${isTester ? 'var(--c-red)' : 'var(--c-blue-light)'}">
                  ${(user.firstName || 'U').charAt(0)}
                </div>
                <div>
                  <div class="t-small" style="font-weight:600">${user.firstName || 'Unknown'} ${user.lastName || ''}</div>
                  <div class="t-mono text-muted2" style="font-size:0.65rem">ID: ${user.id}</div>
                </div>
              </div>
            </td>
            <td style="text-align:center">
              <div class="t-small" style="text-align:center">${user.email}</div>
              <div class="tag ${isTester ? 'tag--red' : 'tag--blue'}" style="font-size:0.6rem; margin:4px auto 0; display:inline-flex; justify-content:center">
                ${isTester ? 'System Account' : 'Verified User'}
              </div>
            </td>
            <td style="text-align:center">
              <div class="t-small" style="text-align:center">${new Date(user.date_joined || user.id * 1000000000).toLocaleDateString()}</div>
            </td>
            <td style="text-align:center">
              <div class="t-small" style="font-weight:600; text-align:center">${qrCount}</div>
            </td>
            <td style="text-align:center">
              <div class="dash-status dash-status--active" style="display:inline-flex; justify-content:center; margin: 0 auto">Active</div>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      // ── LIVE SEARCH ──
      const searchInput = document.getElementById('userDirectorySearch');
      if (searchInput) {
        searchInput.addEventListener('input', () => {
          const query = searchInput.value.toLowerCase().trim();
          const rows = Array.from(tbody.querySelectorAll('tr')).filter(r => r.id !== 'emptyDirectoryRow');
          
          rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(query) ? '' : 'none';
          });
        });
      }
    } catch (err) {
      console.error('Admin API Load Failed:', err);
    }
  });
</script>

</body>
</html>
